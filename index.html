<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tarifas de Transporte</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="contenedor">

    <!-- LOGO -->
    <img src="img/logo.png" alt="Logo OBRAMAT" class="logo">
    <!-- TÍTULO -->
    <h1>Tarifas de Transporte</h1>

    <!-- DESTINO -->

    <div class="grupo">

        <label for="destino">
            📍 Destino
        </label>

<input
    type="text"
    id="destino"
    placeholder="Escribe el pueblo..."
    autocomplete="off">

<div id="sugerencias"></div>

    </div>

    <!-- TIPO -->

    <div class="grupo">

        <label for="tipo">
            🚚 Tipo de transporte
        </label>

        <select id="tipo">

            <option value="LIGERO">Ligero</option>

            <option value="PESADO LIGERO">Pesado Ligero</option>

            <option value="PESADO PARTICULAR">Pesado Particular</option>

            <option value="PESADO PROFESIONAL">Pesado Profesional</option>

        </select>

    </div>

    <!-- BOTÓN -->

    <button onclick="buscarPrecio()">

        CONSULTAR TARIFA

    </button>

    <!-- RESULTADO -->

    <div id="resultado">

        Introduce un destino

    </div>

</div>

<script src="script.js"></script>

</body>

</html>
