<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tarifas de Transporte</title>

    <link rel="stylesheet" href="style.css">

    <!-- Tom Select -->
    <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">

</head>

<body>

<div class="contenedor">

    <img src="img/logo.png" class="logo" alt="Logo">

    <h1>Tarifas de Transporte</h1>

    <div class="grupo">

        <label>📍 Destino</label>

        <select id="destino">

            <option value="">Seleccione un destino...</option>

        </select>

    </div>

    <div class="grupo">

        <label>🚚 Tipo de transporte</label>

        <select id="tipo">

            <option value="LIGERO">Ligero</option>
            <option value="PESADO LIGERO">Pesado Ligero</option>
            <option value="PESADO PARTICULAR">Pesado Particular</option>
            <option value="PESADO PROFESIONAL">Pesado Profesional</option>

        </select>

    </div>

    <div id="resultado">

        Selecciona un destino

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

<script src="script.js"></script>

</body>

</html>
